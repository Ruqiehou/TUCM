<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机生成器 - TUCM</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .generator-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 900px;
            margin: 4rem auto;
            padding: 2rem;
        }
        .gen-box {
            text-align: center;
        }
        .gen-result {
            font-size: 1.5rem;
            color: var(--accent-color);
            min-height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1.5rem 0;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="generator-grid">
        <div class="card-glass gen-box">
            <h2>// 身份识别码 [人名]</h2>
            <p id="randomName" class="gen-result"></p>
            <button id="generateNameBtn" class="btn-tech">重新编译</button>
        </div>
        
        <div class="card-glass gen-box">
            <h2>// 地理坐标 [地名]</h2>
            <p id="randomLocation" class="gen-result"></p>
            <button id="generateLocationBtn" class="btn-tech">重新编译</button>
        </div>
    </div>

    <script src="js/sjrmdm.js"></script>
    <script src="js/layout.js"></script>
</body>
</html>
