<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机生成器 - TUCM</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .generator-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
            max-width: 1000px;
            margin: 3rem auto;
            padding: 2rem;
        }
        .gen-box {
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .gen-box:hover {
            transform: translateY(-5px);
        }
        .gen-result {
            font-size: 1.8rem;
            color: var(--accent-color);
            min-height: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 2rem 0;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 2px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .gen-header {
            margin-bottom: 1.5rem;
        }
        .gen-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }
        @media (max-width: 768px) {
            .generator-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
                margin: 2rem 1rem;
                padding: 1rem;
            }
            .gen-result {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="generator-grid">
        <div class="card-glass gen-box">
            <div class="gen-header">
                <span class="gen-icon">👤</span>
                <h2>// 身份识别码 [人名]</h2>
            </div>
            <p id="randomName" class="gen-result"></p>
            <button id="generateNameBtn" class="btn-tech">重新编译</button>
        </div>
        
        <div class="card-glass gen-box">
            <div class="gen-header">
                <span class="gen-icon">📍</span>
                <h2>// 地理坐标 [地名]</h2>
            </div>
            <p id="randomLocation" class="gen-result"></p>
            <button id="generateLocationBtn" class="btn-tech">重新编译</button>
        </div>
    </div>

    <script src="js/sjrmdm.js"></script>
    <script src="js/layout.js"></script>
</body>
</html>
