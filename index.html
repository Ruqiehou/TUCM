<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>造语者联盟官方网站</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        .hero-section {
            text-align: center;
            padding: 4rem 2rem;
        }
        .hero-title {
            font-size: 3.5rem;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.5rem;
            }
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .category-card h2 {
            color: var(--primary-color);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .tech-link {
            display: block;
            padding: 0.8rem;
            margin: 0.5rem 0;
            border-left: 3px solid var(--primary-color);
            background: rgba(255,255,255,0.05);
            transition: all 0.3s;
        }
        .tech-link:hover {
            background: var(--primary-color);
            color: white;
            padding-left: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="hero-section">
        <h1 class="hero-title">TUCM 造语者联盟</h1>
        <p style="color: var(--text-muted); max-width: 600px; margin: 0 auto;">探索语言的边界，构建想象的维度。成立于2020年，致力于人造语言与世界观设定的前沿研究。</p>
    </div>
    
    <div class="grid-container">
        <div class="card-glass category-card">
            <h2>// 核心内容</h2>
            <a href="ruqiehou.html" class="tech-link">汝且候简介</a>
            <a href="pages/page0.html" class="tech-link">文集档案</a>
        </div>

        <div class="card-glass category-card">
            <h2>// 研发工具</h2>
            <a href="zcj.html" class="tech-link">造词机 [ZCJ]</a>
            <a href="csmsword.html" class="tech-link">查索玛苏语词典</a>
            <a href="sjrmdm.html" class="tech-link">随机人名地名生成器</a>
            <a href="zxcd.html" class="tech-link">用户中心</a>
        </div>

        <div class="card-glass category-card">
            <h2>// 外部链接</h2>
            <a href="https://tucm.fandom.com/zh/wiki/%E9%80%A0%E8%AF%AD%E8%80%85%E8%81%94%E7%9B%9F_Wiki" target="_blank" class="tech-link">造语者联盟 Wiki</a>
            <a href="http://wiki.tucm.top/" target="_blank" class="tech-link">独立 Wiki 站点</a>
        </div>
    </div>

    <script src="js/layout.js"></script>
</body>
</html>
