<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>造词机 - TUCM</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .zcj-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 2rem;
            max-width: 1400px;
            margin: 2rem auto;
            padding: 2rem;
            min-height: calc(100vh - 150px);
        }
        @media (max-width: 900px) { 
            .zcj-layout { 
                grid-template-columns: 1fr; 
                min-height: auto;
                padding: 1rem;
            } 
        }
        
        .config-panel {
            overflow-y: auto;
            padding-right: 10px;
        }
        .output-panel {
            display: flex;
            flex-direction: column;
        }
        .word-display {
            flex-grow: 1;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--primary-color);
            border-radius: 12px;
            padding: 1.5rem;
            font-family: 'Courier New', monospace;
            color: #a5f3fc;
            overflow-y: auto;
            white-space: pre-wrap;
            box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.1);
            min-height: 400px;
        }
        textarea.input-neon {
            min-height: 100px;
            resize: vertical;
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
        }
        .control-group { margin-bottom: 1.5rem; }
        .control-group label { 
            display: block; 
            margin-bottom: 0.5rem; 
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .counter {
            margin: 1rem 0;
            color: var(--accent-color);
            font-weight: 600;
            font-size: 1.1rem;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
        }
        .btn-secondary:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="zcj-layout">
        <div class="card-glass config-panel">
            <h2>// 参数配置</h2>
            
            <div class="control-group">
                <label>音节结构模板 (C=辅音, V=元音)</label>
                <input type="text" id="syllablePattern" class="input-neon" value="CV CVC">
            </div>

            <div class="control-group">
                <label>辅音库 (C)</label>
                <textarea id="consonants" class="input-neon">p,t,k,b,d,g,m,n,f,s,sh,r,l</textarea>
            </div>

            <div class="control-group">
                <label>元音库 (V)</label>
                <textarea id="vowels" class="input-neon">a,e,i,o,u,ai,ei,ao,ou</textarea>
            </div>

            <button id="generateBtn" class="btn-tech" style="width: 100%;">启动生成程序</button>
            <button id="clearBtn" class="btn-tech btn-secondary" style="width: 100%; margin-top: 1rem;">清除缓存</button>
        </div>

        <div class="card-glass output-panel">
            <h2>// 生成结果流</h2>
            <div class="counter" style="margin: 1rem 0; color: var(--accent-color);">
                已编译词汇量: <span id="wordCount">0</span>
            </div>
            <div id="wordOutput" class="word-display"></div>
            <button id="exportBtn" class="btn-tech" style="margin-top: 1rem;">导出为数据文件 [TXT]</button>
        </div>
    </div>

    <script src="js/csmsword888.js"></script> <!-- Keeping for shared utilities if any, though zcj has its own logic -->
    <script>
        // Embedded ZCJ Logic from original zcj.html to ensure functionality remains
        document.addEventListener('DOMContentLoaded', function() {
            let generatedWords = [];
            const syllablePattern = document.getElementById('syllablePattern');
            const generateBtn = document.getElementById('generateBtn');
            const exportBtn = document.getElementById('exportBtn');
            const clearBtn = document.getElementById('clearBtn');
            const wordOutput = document.getElementById('wordOutput');
            const wordCount = document.getElementById('wordCount');

            generateBtn.addEventListener('click', generateWords);
            clearBtn.addEventListener('click', () => { wordOutput.innerHTML = ''; wordCount.textContent = '0'; });
            
            exportBtn.addEventListener('click', function() {
                const content = generatedWords.join('\n');
                if (!content) return alert('请先生成一些词语！');
                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'generated_words.txt';
                document.body.appendChild(a); a.click();
                setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 0);
            });
            
            function generateWords() {
                const pattern = syllablePattern.value.trim();
                if (!pattern) return alert('请输入音节结构');
                
                const consonants = document.getElementById('consonants').value.split(',').map(s => s.trim()).filter(Boolean);
                const vowels = document.getElementById('vowels').value.split(',').map(s => s.trim()).filter(Boolean);
                const phonemeMap = { 'C': consonants, 'V': vowels };
                const syllables = pattern.split(' ').map(syll => syll.toUpperCase());
                
                let words = [''];
                for (const syll of syllables) {
                    const newWords = [];
                    for (const word of words) {
                        const syllCombinations = generateSyllableCombinations(syll, phonemeMap);
                        for (const combination of syllCombinations) {
                            const newWord = word ? word + ' ' + combination : combination;
                            newWords.push(newWord);
                        }
                    }
                    words = newWords;
                }
                
                wordOutput.innerHTML = words.join('<br>');
                wordCount.textContent = words.length;
                generatedWords = words;
            }
            
            function generateSyllableCombinations(syllable, phonemeMap) {
                const positions = syllable.split('');
                let combinations = [''];
                for (const pos of positions) {
                    const newCombinations = [];
                    const phonemes = phonemeMap[pos] || [pos];
                    for (const phoneme of phonemes) {
                        for (const combo of combinations) {
                            newCombinations.push(combo + phoneme);
                        }
                    }
                    combinations = newCombinations;
                }
                return combinations;
            }
            generateWords();
        });
    </script>
    <script src="js/layout.js"></script>
</body>
</html>
