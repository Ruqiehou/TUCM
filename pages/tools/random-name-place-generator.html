<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机人名地名生成器 - 造语者联盟</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <main class="site-main">
        <header class="page-header">
            <span class="tag">Random Generator</span>
            <h1>随机人名地名生成器</h1>
            <p class="subtitle">快速生成中文风格的人名与地名素材。</p>
        </header>

        <div class="card-grid">
            <section class="card">
                <span class="tag">人名</span>
                <h2>随机人名生成</h2>
                <div id="randomName" class="result-box mb-4"></div>
                <button class="btn btn-primary" id="generateNameBtn" type="button">生成新人名</button>
            </section>
            <section class="card">
                <span class="tag">地名</span>
                <h2>随机地名生成</h2>
                <div id="randomLocation" class="result-box mb-4"></div>
                <button class="btn btn-primary" id="generateLocationBtn" type="button">生成新地名</button>
            </section>
        </div>
    </main>
    <script src="../../assets/js/generator.js"></script>
    <script src="../../assets/js/layout.js"></script>
</body>
</html>
