<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语联文集 - TUCM</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .archive-hero {
            text-align: center;
            padding: 3rem 2rem;
        }
        .archive-title {
            font-size: 3rem;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .news-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }
        .news-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            margin-bottom: 1rem;
            background: rgba(255,255,255,0.03);
            border-left: 4px solid var(--primary-color);
            transition: all 0.3s ease;
        }
        .news-item:hover {
            background: rgba(59, 130, 246, 0.1);
            transform: translateX(10px);
        }
        .news-content h2 {
            font-size: 1.4rem;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }
        .news-content p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .news-link {
            color: var(--accent-color);
            font-weight: bold;
            white-space: nowrap;
            margin-left: 1.5rem;
        }
        @media (max-width: 768px) {
            .archive-title { font-size: 2.2rem; }
            .news-item { flex-direction: column; align-items: flex-start; }
            .news-link { margin-left: 0; margin-top: 1rem; }
        }
    </style>
</head>
<body>
    <div class="archive-hero">
        <h1 class="archive-title">语联文集档案</h1>
        <p style="color: var(--text-muted); max-width: 600px; margin: 0 auto;">探索造语者联盟的文学创作与理论研究成果。</p>
    </div>

    <div class="news-container card-glass">
        <a href="page1.html" class="news-item">
            <div class="news-content">
                <h2>// Ambi 现象研究</h2>
                <p>ambi - 深度符号学分析</p>
            </div>
            <span class="news-link">阅读全文 ></span>
        </a>

        <a href="page2.html" class="news-item">
            <div class="news-content">
                <h2>// 帝国的诞生：汝且侯</h2>
                <p>小说一篇 - 文明建设史诗</p>
            </div>
            <span class="news-link">阅读全文 ></span>
        </a>
        
        <a href="page3.html" class="news-item">
            <div class="news-content">
                <h2>// 论述文三</h2>
                <p>论述文 - 语言学范式革新</p>
            </div>
            <span class="news-link">阅读全文 ></span>
        </a>
        
        <a href="page4.html" class="news-item">
            <div class="news-content">
                <h2>// 论述文四</h2>
                <p>论述文 - 双核层级理论纲要</p>
            </div>
            <span class="news-link">阅读全文 ></span>
        </a>
    </div>

    <script src="../js/layout.js"></script>
</body>
</html>
