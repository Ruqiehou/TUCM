<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查索玛苏语词典 - TUCM</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .search-container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 2rem;
        }
        .result-card {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--primary-color);
            padding: 1.5rem;
            margin-top: 1.5rem;
            border-radius: 8px;
        }
        .result-list {
            margin-top: 1.5rem;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .cn { color: var(--text-muted); }
        .conlang { color: var(--accent-color); font-weight: bold; }
        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .placeholder-text { text-align: center; color: var(--text-muted); margin-top: 2rem; }
        .no-result { text-align: center; color: #ef4444; margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="search-container card-glass">
        <h1 style="text-align: center; margin-bottom: 2rem;">查索玛苏语词典</h1>
        <input type="text" id="inputWord" class="input-neon" placeholder="输入中文或查语单词..." onkeyup="searchWord()">
        <div id="result"></div>
    </div>

    <script src="js/csmsword888.js"></script>
    <script src="js/layout.js"></script>
</body>
</html>
